name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Nhánh bạn đẩy code lên

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write      # Cần quyền ghi để deploy
      id-token: write   # Cần để xác thực với GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        with:
          artifact_repo: ./build # Docusaurus mặc định build ra thư mục này